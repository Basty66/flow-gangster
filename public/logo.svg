<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="fgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="fgGrad2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Hexagonal background shield -->
  <polygon points="100,22 168,58 168,130 100,166 32,130 32,58"
           fill="rgba(139,92,246,0.04)" stroke="rgba(139,92,246,0.08)" stroke-width="0.5"/>

  <!-- Accent lines top -->
  <line x1="50" y1="32" x2="150" y2="32" stroke="url(#lineGrad)" stroke-width="1"/>

  <!-- F letter - geometric style -->
  <g transform="translate(0, 4)">
    <!-- F vertical stem -->
    <rect x="72" y="52" width="8" height="88" rx="1" fill="url(#fgGrad)"/>
    <!-- F top horizontal -->
    <rect x="72" y="52" width="48" height="8" rx="1" fill="url(#fgGrad)"/>
    <!-- F middle horizontal (shorter, angled) -->
    <rect x="72" y="82" width="36" height="7" rx="1" fill="url(#fgGrad2)" opacity="0.85"/>
    <!-- F glitch accent -->
    <rect x="72" y="60" width="4" height="4" rx="0.5" fill="#22d3ee" opacity="0.4"/>
  </g>

  <!-- G letter - geometric style with cutout -->
  <g transform="translate(0, 4)">
    <!-- G outer curve -->
    <path d="M128 58 C146 58 148 60 148 78 L148 90 L136 90 L136 82 C136 72 134 68 128 68 L108 68 C101 68 96 72 96 80 L96 112 C96 120 100 124 108 124 L128 124 C133 124 136 120 136 114 L136 108 L122 108 L122 96 L148 96 L148 114 C148 132 145 136 128 136 L108 136 C90 136 84 128 84 112 L84 80 C84 64 90 58 108 58 Z"
          fill="url(#fgGrad)"/>
    <!-- G inner dot accent -->
    <circle cx="140" cy="78" r="3" fill="#22d3ee" opacity="0.6"/>
  </g>

  <!-- Velocity/tech lines -->
  <line x1="60" y1="170" x2="140" y2="170" stroke="url(#lineGrad)" stroke-width="0.5" opacity="0.6"/>
  <line x1="70" y1="175" x2="130" y2="175" stroke="url(#lineGrad)" stroke-width="0.5" opacity="0.3"/>

  <!-- Brand name below -->
  <text x="100" y="164" font-family="Inter, sans-serif" font-weight="700" font-size="8"
        fill="#fafafa" text-anchor="middle" letter-spacing="8" opacity="0.9">FLOW GANGSTER</text>

  <!-- Small cyan dot accent -->
  <circle cx="100" cy="179" r="1.5" fill="#22d3ee"/>
</svg>
